<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">

<head>

    <head th:replace="~{layout :: head-comune('Lista Squadre')}"></head>

</head>

<body>
    <header th:replace="~{layout :: headbar}"></header>


    <main class="container">


        <h1>Squadre Disponibili</h1>

        <!-- Visibile solo agli amministratori -->
        <section sec:authorize="hasAuthority('ADMIN')" class="admin-panel mb-30">
            <strong>Pannello Admin</strong>

            <div class="admin-actions d-flex flex-wrap gap-12 mt-15">
                <a th:href="@{/admin/squadre/nuova}" class="btn btn-primary text-center">
                    + Aggiungi squadra
                </a>
            </div>
        </section>

        <!-- Messaggio se non esistono squadre -->
        <section th:if="${#lists.isEmpty(squadre)}" class="empty-state text-center">
            <h2>Nessuna squadra disponibile</h2>
            <p>Al momento non ci sono squadre registrate.</p>
        </section>

        <!-- Tabella delle squadre -->
        <table th:unless="${#lists.isEmpty(squadre)}">
            <thead>
                <tr>
                    <th>Nome Squadra</th>
                    <th>Città</th>
                    <th>Anno Fondazione</th>
                    <th>Dettagli</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="squadra : ${squadre}">
                    <td th:text="${squadra.nome}">Nome Placeholder</td>
                    <td th:text="${squadra.citta}">Roma</td>
                    <td th:text="${squadra.annoFondazione}">1927</td>

                    <td>
                        <a class="btn btn-secondary d-inline-flex align-items-center mb-25"
                            th:href="@{/squadra/{id}(id=${squadra.id})}">
                            Vedi dettagli →
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

</body>

</html>
