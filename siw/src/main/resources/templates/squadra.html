<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="|${squadra.nome} - Dettaglio Squadra|">
        Dettaglio Squadra
    </title>

    <link rel="stylesheet" th:href="@{/style.css}">

    <!-- React 18 + ReactDOM + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header th:replace="~{layout :: headbar}"></header>


    <main class="container">

        <a th:href="@{/tornei}" class="btn btn-secondary d-inline-flex align-items-center mb-25">
            ← Torna ai tornei
        </a>

        <h1 th:text="${squadra.nome}">Nome squadra</h1>

        <section class="card">
            <p>
                <strong>Città:</strong>
                <span th:text="${squadra.citta}">Città</span>
            </p>

            <p>
                <strong>Anno di fondazione:</strong>
                <span th:text="${squadra.annoFondazione}">Anno</span>
            </p>
        </section>

        <h2>Rosa giocatori</h2>

        <!-- Thymeleaf inserisce qui il nome effettivo della squadra -->
        <script th:inline="javascript">
            const nomeSquadraAttuale = /*[[${squadra.nome}]]*/ 'Nome Squadra';
        </script>

        <!-- React inserisce qui la barra di ricerca e la tabella -->
        <div id="react-giocatori">
            <p>Caricamento giocatori in corso...</p>
        </div>

    </main>

    <!--
        Questo script NON deve essere analizzato da Thymeleaf:
        contiene JSX di React, che altrimenti verrebbe interpretato
        erroneamente come HTML.
    -->
    <script type="text/babel" th:inline="none">
        /*<![CDATA[*/

        function RosaSquadra() {
            const [giocatori, setGiocatori] = React.useState([]);
            const [testoRicerca, setTestoRicerca] = React.useState("");
            const [minAltezza, setMinAltezza] = React.useState("");
            const [ordinamento, setOrdinamento] = React.useState("nomeAsc");
            const [caricamento, setCaricamento] = React.useState(true);
            const [errore, setErrore] = React.useState(false);

            React.useEffect(() => {
                fetch("/api/giocatori")
                    .then(response => {
                        if (!response.ok) {
                            throw new Error("Impossibile caricare i giocatori");
                        }

                        return response.json();
                    })
                    .then(dati => {
                        const giocatoriSquadra = dati.filter(
                            giocatore => giocatore.squadra === nomeSquadraAttuale
                        );

                        setGiocatori(giocatoriSquadra);
                    })
                    .catch(error => {
                        console.error("Errore di caricamento:", error);
                        setErrore(true);
                    })
                    .finally(() => {
                        setCaricamento(false);
                    });
            }, []);

            const ricerca = testoRicerca.trim().toLowerCase();

            const giocatoriFiltrati = giocatori.filter(giocatore => {
                const nomeCompleto =
                    `${giocatore.nome} ${giocatore.cognome}`.toLowerCase();

                const matchNome = nomeCompleto.includes(ricerca);

                const altezzaGiocatore = giocatore.altezza || 0;
                const altezzaMinima = parseFloat(minAltezza);
                const matchAltezza = minAltezza === "" || isNaN(altezzaMinima) || altezzaGiocatore >= altezzaMinima;

                return matchNome && matchAltezza;
            });

            // Ordinamento
            giocatoriFiltrati.sort((a, b) => {
                if (ordinamento === "nomeAsc") {
                    return a.nome.localeCompare(b.nome);
                } else if (ordinamento === "nomeDesc") {
                    return b.nome.localeCompare(a.nome);
                } else if (ordinamento === "altezzaAsc") {
                    return (a.altezza || 0) - (b.altezza || 0);
                } else if (ordinamento === "altezzaDesc") {
                    return (b.altezza || 0) - (a.altezza || 0);
                } else if (ordinamento === "ruolo") {
                    return (a.ruolo || "").localeCompare(b.ruolo || "");
                }
                return 0;
            });

            if (caricamento) {
                return <p>Caricamento rosa in corso...</p>;
            }

            if (errore) {
                return (
                    <p>
                        Non è stato possibile caricare la rosa.
                        Riprova più tardi.
                    </p>
                );
            }

            if (giocatori.length === 0) {
                return (
                    <p>
                        Nessun giocatore registrato per questa squadra.
                    </p>
                );
            }

            return (
                <div>
                    <div className="search-box d-flex gap-12 align-items-center mb-20">
                        <input
                            type="search"
                            className="search-input flex-1"
                            placeholder={`Cerca per nome...`}
                            value={testoRicerca}
                            onChange={(event) =>
                                setTestoRicerca(event.target.value)
                            }
                        />
                        <input
                            type="number"
                            className="form-control"
                            placeholder="Altezza min."
                            style={{ maxWidth: '150px' }}
                            value={minAltezza}
                            onChange={(event) => setMinAltezza(event.target.value)}
                            step="0.01"
                            min="0"
                        />
                        <select
                            className="form-control"
                            value={ordinamento}
                            onChange={(e) => setOrdinamento(e.target.value)}
                            style={{ maxWidth: '200px' }}
                        >
                            <option value="nomeAsc">Nome (A-Z)</option>
                            <option value="nomeDesc">Nome (Z-A)</option>
                            <option value="altezzaDesc">Altezza (Decresc.)</option>
                            <option value="altezzaAsc">Altezza (Cresc.)</option>
                            <option value="ruolo">Ruolo</option>
                        </select>
                    </div>

                    {giocatoriFiltrati.length > 0 ? (
                        <table>
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Cognome</th>
                                    <th>Ruolo</th>
                                    <th>Altezza</th>
                                </tr>
                            </thead>

                            <tbody>
                                {giocatoriFiltrati.map(giocatore => (
                                    <tr key={giocatore.id}>
                                        <td>{giocatore.nome}</td>
                                        <td>{giocatore.cognome}</td>
                                        <td>{giocatore.ruolo}</td>
                                        <td>{giocatore.altezza ? giocatore.altezza : "-"}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    ) : (
                        <p>
                            Nessun giocatore trovato per la ricerca:
                            <strong> {testoRicerca}</strong>.
                        </p>
                    )}
                </div>
            );
        }

        const contenitore = document.getElementById("react-giocatori");
        const root = ReactDOM.createRoot(contenitore);

        root.render(<RosaSquadra />);

        /*]]>*/
    </script>

</body>

</html>
