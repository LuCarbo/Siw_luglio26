<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login - Tornei Amatoriali</title>
    <!-- Colleghiamo il foglio di stile esterno -->
    <link rel="stylesheet" th:href="@{/style.css}">
</head> 
<body>
    <header th:replace="~{layout :: headbar}"></header>


    <!-- Usiamo la classe .login-container del nuovo CSS -->
    <div class="login-container">
        <h1>Accedi al Sistema</h1>
        
        <!-- Messaggi di errore/logout -->
        <div th:if="${param.error}" style="color: red; text-align: center; margin-bottom: 15px;">
            Username o password non validi.
        </div>
        <div th:if="${param.logout}" style="color: green; text-align: center; margin-bottom: 15px;">
            Disconnessione avvenuta con successo.
        </div>

        <!-- Form con le nuove classi CSS -->
        <form th:action="@{/login}" method="post">
            <div class="form-group mb-20">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="form-group mb-20">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary text-center" style="width: 100%; margin-top: 20px;">Entra</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div style="text-align: center;">
            <p style="margin-bottom: 15px; color: #718096;">Oppure accedi con:</p>
            <a th:href="@{/oauth2/authorization/google}" class="btn" style="width: 100%; background-color: #ffffff; color: #333; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Accedi con Google
            </a>
        </div>
    </div>

</body>
</html>
