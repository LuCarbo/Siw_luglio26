<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">

<head th:replace="~{layout :: head-comune('Nuovo Giocatore')}"></head>

<body>
    <header th:replace="~{layout :: headbar}"></header>

    <main class="container">

        <a th:href="@{/tornei}" class="btn btn-secondary d-inline-flex align-items-center mb-25">
            ← Torna alla Home
        </a>

        <h1>Crea Nuovo Giocatore</h1>

        <div class="form-container">
            <form th:action="@{/admin/giocatori/salva}" th:object="${giocatore}" method="post">

                <div class="form-group mb-20">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" class="form-control" th:field="*{nome}" required autofocus>
                </div>

                <div class="form-group mb-20">
                    <label for="cognome">Cognome</label>
                    <input type="text" id="cognome" class="form-control" th:field="*{cognome}" required>
                </div>

                <div class="form-group mb-20">
                    <label for="ruolo">Ruolo</label>
                    <input type="text" id="ruolo" class="form-control" th:field="*{ruolo}">
                </div>

                <div class="form-group mb-20">
                    <label for="altezza">Altezza (m)</label>
                    <input type="number" step="0.01" id="altezza" class="form-control" th:field="*{altezza}">
                </div>

                <div class="form-actions d-flex flex-wrap align-items-center gap-12 mt-20">
                    <button type="submit" class="btn btn-primary text-center">
                        Salva giocatore
                    </button>

                    <a th:href="@{/tornei}" class="btn btn-secondary text-center">
                        Annulla
                    </a>
                </div>

            </form>
        </div>

    </main>

</body>

</html>
