<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head th:replace="~{layout :: head-comune('Pianifica Partita')}"></head>
<body>
    <header th:replace="~{layout :: headbar}"></header>

    <main class="container">
        <h1 th:text="${partita.id == null ? 'Pianifica nuova partita' : 'Modifica partita'}">
            Pianifica Partita
        </h1>

        <div class="form-container">

            <div th:if="${erroreSquadre}" class="alert alert-danger" style="color: red; margin-bottom: 15px;" th:text="${erroreSquadre}"></div>
            
            <form th:action="@{/admin/partita/salva}" th:object="${partita}" method="post">

                <input type="hidden" th:field="*{id}">
                
                <div class="form-group mb-20">
                    <label for="stato">Stato Partita</label>
                    <select id="stato" class="form-control" th:field="*{stato}" required>
                        <option value="SCHEDULED">Programmata</option>
                        <option value="PLAYED">Giocata</option>
                        <option value="POSTPONED">Rinviata</option>
                        <option value="CANCELED">Cancellata</option>
                    </select>
                </div>

                <div class="d-flex gap-12 mb-20">
                    <div class="form-group" style="flex: 1;">
                        <label for="goalsHome">Gol Casa</label>
                        <input type="number" id="goalsHome" class="form-control" th:field="*{goalsHome}" min="0">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="goalsAway">Gol Trasferta</label>
                        <input type="number" id="goalsAway" class="form-control" th:field="*{goalsAway}" min="0">
                    </div>
                </div>

                <div class="form-group mb-20">
                    <label>Torneo</label>
                    <input type="text" class="form-control" th:value="${torneoCorrente.nome}" disabled>
                    <input type="hidden" th:field="*{torneo}">
                </div>

                <div class="form-group mb-20">
                    <label for="squadraCasa">Squadra in casa</label>
                    <select id="squadraCasa" class="form-control" th:field="*{squadraCasa}" required>
                        <option value="">-- Seleziona squadra casa --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>

                <div class="form-group mb-20">
                    <label for="squadraTrasferta">Squadra in trasferta</label>
                    <select id="squadraTrasferta" class="form-control" th:field="*{squadraTrasferta}" required>
                        <option value="">-- Seleziona squadra trasferta --</option>
                        <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                    </select>
                </div>

                <div class="form-group mb-20">
                    <label for="dataOra">Data e ora</label>
                    <input type="datetime-local" id="dataOra" class="form-control" th:field="*{dataOra}" required>
                </div>

                <div class="form-group mb-20">
                    <label for="luogo">Luogo / stadio</label>
                    <input type="text" id="luogo" class="form-control" th:field="*{luogo}" placeholder="Es. Campo Sportivo Roma Nord" required>
                </div>

                <div class="form-actions d-flex flex-wrap align-items-center gap-12 mt-20">
                    <button type="submit" class="btn btn-primary text-center">Salva partita</button>
                    <a th:href="@{/tornei}" class="btn btn-secondary text-center">Annulla</a>
                </div>
            </form>
        </div>

        <script>
            document.querySelector('form').addEventListener('submit', function(e) {
                var squadraCasa = document.getElementById('squadraCasa').value;
                var squadraTrasferta = document.getElementById('squadraTrasferta').value;
                if (squadraCasa && squadraTrasferta && squadraCasa === squadraTrasferta) {
                    e.preventDefault();
                    alert('Errore: La squadra in casa non può essere uguale alla squadra in trasferta.');
                }
            });
        </script>
    </main>
</body>
</html>
