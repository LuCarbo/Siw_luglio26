<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head th:replace="~{layout :: head-comune('Gestione Torneo')}"></head>
<body>
    <header th:replace="~{layout :: headbar}"></header>

    <main class="container">
       
        <h1 th:text="${torneo.id == null ? 'Nuovo Torneo' : 'Modifica Torneo'}">Gestione Torneo</h1>

    <div class="form-container">
        
        <form th:action="@{/admin/tornei/salva}" th:object="${torneo}" method="post">
            
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group mb-20">
                <label for="nome">Nome del Torneo:</label>
                <input type="text" id="nome" class="form-control" th:field="*{nome}" required />
            </div>

            <div class="form-group mb-20">
                <label for="anno">Anno:</label>
                <input type="number" id="anno" class="form-control" th:field="*{anno}" required />
            </div>

            <div class="form-group mb-20">
                <label for="descrizione">Descrizione:</label>
                <textarea id="descrizione" class="form-control" th:field="*{descrizione}" rows="4"></textarea>
            </div>

            <div class="form-actions d-flex flex-wrap align-items-center gap-12 mt-20">
                <button type="submit" class="btn btn-primary text-center">Salva Torneo</button>
                <a th:href="${torneo.id != null} ? @{/torneo/{id}(id=${torneo.id})} : @{/tornei}" class="btn btn-secondary text-center">Annulla</a>
            </div>
        </form>
    </div>
    </main>
</body>
</html>
