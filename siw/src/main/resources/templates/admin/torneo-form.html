<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Torneo</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

    <!-- Il titolo cambia a seconda se l'ID esiste o no -->
    <h1 th:text="${torneo.id == null ? 'Nuovo Torneo' : 'Modifica Torneo'}">Gestione Torneo</h1>

    <div class="form-container">
        <!-- Invia i dati tramite POST all'URL /admin/tornei/salva -->
        <form th:action="@{/admin/tornei/salva}" th:object="${torneo}" method="post">
            
            <!-- Questo campo nascosto è VITALE: dice a Spring l'ID del torneo da modificare -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nome">Nome del Torneo:</label>
                <input type="text" id="nome" th:field="*{nome}" required />
            </div>

            <div class="form-group">
                <label for="anno">Anno:</label>
                <input type="number" id="anno" th:field="*{anno}" required />
            </div>

            <div class="form-group">
                <label for="descrizione">Descrizione:</label>
                <textarea id="descrizione" th:field="*{descrizione}" rows="4"></textarea>
            </div>

            <button type="submit" class="btn">Salva Torneo</button>
            <a th:href="@{/tornei}" class="btn btn-cancel">Annulla</a>
        </form>
    </div>

</body>
</html>
