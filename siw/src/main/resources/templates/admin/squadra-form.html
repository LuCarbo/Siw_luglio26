<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">

<head th:replace="~{layout :: head-comune(${squadra.id == null ? 'Nuova Squadra' : 'Modifica Squadra'})}"></head>

<body>
    <header th:replace="~{layout :: headbar}"></header>


    <main class="container">

        <a th:href="@{/tornei}" class="btn btn-secondary d-inline-flex align-items-center mb-25">
            ← Torna all'elenco tornei
        </a>

        <h1 th:text="${squadra.id == null ? 'Nuova Squadra' : 'Modifica Squadra'}">
            Gestione Squadra
        </h1>

        <div class="form-container">
            <form th:action="@{/admin/squadre/salva}" th:object="${squadra}" method="post">

                <!-- Necessario per riconoscere la squadra da modificare -->
                <input type="hidden" th:field="*{id}">

                <div class="form-group mb-20">
                    <label for="nome">Nome della squadra</label>
                    <input type="text" id="nome" class="form-control" th:field="*{nome}" required autofocus>
                </div>

                <div class="form-group mb-20">
                    <label for="citta">Città</label>
                    <input type="text" id="citta" class="form-control" th:field="*{citta}" required>
                </div>

                <div class="form-group mb-20">
                    <label for="annoFondazione">Anno di fondazione</label>
                    <input type="number" id="annoFondazione" class="form-control" th:field="*{annoFondazione}">
                </div>

                <div class="form-actions d-flex flex-wrap align-items-center gap-12 mt-20">
                    <button type="submit" class="btn btn-primary text-center">
                        Salva squadra
                    </button>

                    <a th:href="@{/tornei}" class="btn btn-secondary text-center">
                        Annulla
                    </a>
                </div>

            </form>
        </div>

        <div th:if="${squadra.id != null}" class="form-container mt-20">
            <h2>Giocatori della Squadra</h2>
            <ul class="mb-20">
                <li th:each="giocatore : ${squadra.giocatori}" class="d-flex align-items-center justify-content-between mb-10">
                    <span th:text="${giocatore.nome} + ' ' + ${giocatore.cognome} + ' (' + ${giocatore.ruolo} + ')'">Nome Giocatore</span>
                    <a th:href="@{/admin/squadre/{squadraId}/giocatori/{giocatoreId}/rimuovi(squadraId=${squadra.id}, giocatoreId=${giocatore.id})}" class="btn btn-secondary btn-sm">Rimuovi</a>
                </li>
            </ul>

            <hr>

            <h3>Aggiungi Giocatore Svincolato</h3>
            <form th:action="@{/admin/squadre/{id}/giocatori/esistente(id=${squadra.id})}" method="post" class="mb-20">
                <div class="form-group">
                    <select name="giocatoreId" class="form-control" required>
                        <option value="" disabled selected>-- Seleziona un giocatore --</option>
                        <option th:each="g : ${giocatoriSvincolati}" th:value="${g.id}" th:text="${g.nome} + ' ' + ${g.cognome}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary mt-10">Aggiungi</button>
            </form>
        </div>

    </main>

</body>

</html>
