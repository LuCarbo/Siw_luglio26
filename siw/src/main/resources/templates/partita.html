<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Partita</title>
    <!-- Caricamento di Tailwind CSS e Font Inter per un look moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Grigio chiaro elegante */
        }
    </style>
</head>
<body class="text-gray-800 antialiased p-4 md:p-8">

    <!-- Contenitore Principale -->
    <div class="max-w-3xl mx-auto">
        
        <!-- Bottone Indietro -->
        <a th:href="@{/tornei}" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium mb-6 transition-colors">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Torna ai Tornei
        </a>

        <!-- Card Partita -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-10 mb-8">
            <div class="text-center">
                <span class="inline-block px-3 py-1 bg-green-100 text-green-800 text-xs font-bold rounded-full mb-4 uppercase tracking-wide">
                    Risultato
                </span>
                
                <!-- Nomi Squadre e Risultato -->
                <div class="flex items-center justify-center space-x-6">
                    <div class="text-right flex-1">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-900" th:text="${partita.squadraCasa.nome}">Squadra 1</h2>
                    </div>
                    
                    <div class="px-6 py-4 bg-gray-50 rounded-xl border border-gray-200">
                        <span class="text-4xl font-black text-gray-800" th:text="${partita.goalsHome != null ? partita.goalsHome : '0'}">0</span>
                        <span class="text-2xl font-medium text-gray-400 mx-2">-</span>
                        <span class="text-4xl font-black text-gray-800" th:text="${partita.goalsAway != null ? partita.goalsAway : '0'}">0</span>
                    </div>
                    
                    <div class="text-left flex-1">
                        <h2 class="text-2xl md:text-3xl font-bold text-gray-900" th:text="${partita.squadraTrasferta.nome}">Squadra 2</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sezione Commenti -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
            <h3 class="text-xl font-bold text-gray-900 mb-6 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                Commenti dei Tifosi
            </h3>

            <!-- FORM INSERIMENTO NUOVO COMMENTO (Visibile solo se loggati) -->
            <div th:if="${utenteLoggatoId != null}" class="mb-8">
                <form th:action="@{/partita/{id}/commento(id=${partita.id})}" method="post" class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                    <label for="testo" class="block text-sm font-medium text-gray-700 mb-2">Lascia un commento sulla partita:</label>
                    <textarea name="testo" id="testo" rows="3" 
                              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none" 
                              placeholder="Scrivi cosa ne pensi..." required></textarea>
                    <div class="mt-3 flex justify-end">
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm">
                            Pubblica Commento
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- MESSAGGIO PER I VISITATORI ANONIMI -->
            <div th:if="${utenteLoggatoId == null}" class="mb-8 bg-blue-50 border border-blue-100 p-4 rounded-xl flex items-center justify-between">
                <p class="text-blue-800 text-sm">Devi essere autenticato per poter commentare.</p>
                <a th:href="@{/login}" class="text-sm font-medium bg-white text-blue-600 border border-blue-200 py-1.5 px-4 rounded-lg hover:bg-blue-50 transition-colors">Accedi</a>
            </div>

            <!-- LISTA DEI COMMENTI -->
            <div th:if="${#lists.isEmpty(commenti)}" class="text-center py-8">
                <p class="text-gray-500 italic">Non ci sono ancora commenti per questa partita. Sii il primo!</p>
            </div>

            <div class="space-y-4">
                <div th:each="commento : ${commenti}" class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                    
                    <!-- Intestazione commento -->
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center">
                            <div class="h-8 w-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3" th:text="${#strings.substring(commento.autore.username,0,1).toUpperCase()}">U</div>
                            <div>
                                <strong class="text-gray-900 block text-sm" th:text="${commento.autore.username}">Utente</strong>
                                <!-- Mostra la data se presente -->
                                <span class="text-xs text-gray-500" th:if="${commento.dataCreazione != null}" th:text="${#temporals.format(commento.dataCreazione, 'dd/MM/yyyy HH:mm')}">Data</span>
                            </div>
                        </div>
                        
                        <!-- Pulsante Modifica (Mostrato SOLO all'autore) -->
                        <div th:if="${utenteLoggatoId != null and utenteLoggatoId == commento.autore.id}">
                            <button type="button" th:onclick="'document.getElementById(\'form-modifica-' + ${commento.id} + '\').classList.toggle(\'hidden\');'" 
                                    class="text-xs font-medium text-gray-500 hover:text-gray-700 bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded-md transition-colors">
                                Modifica
                            </button>
                        </div>
                    </div>

                    <!-- Testo del commento -->
                    <p class="text-gray-700 text-sm mt-3 leading-relaxed" th:text="${commento.testo}">Testo del commento...</p>

                    <!-- Form di Modifica (Inizialmente nascosto) -->
                    <div th:if="${utenteLoggatoId != null and utenteLoggatoId == commento.autore.id}" 
                         th:id="'form-modifica-' + ${commento.id}" 
                         class="hidden mt-4 pt-4 border-t border-dashed border-gray-200">
                         
                        <form th:action="@{/partita/{pId}/commento/{cId}/modifica(pId=${partita.id}, cId=${commento.id})}" method="post">
                            <textarea name="nuovoTesto" rows="2" 
                                      class="w-full px-3 py-2 text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none resize-none" 
                                      th:text="${commento.testo}" required></textarea>
                            <div class="mt-2 flex space-x-2">
                                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white text-xs font-medium py-1.5 px-4 rounded-md transition-colors">
                                    Salva Modifica
                                </button>
                                <button type="button" th:onclick="'document.getElementById(\'form-modifica-' + ${commento.id} + '\').classList.add(\'hidden\');'" 
                                        class="bg-gray-200 hover:bg-gray-300 text-gray-800 text-xs font-medium py-1.5 px-4 rounded-md transition-colors">
                                    Annulla
                                </button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
