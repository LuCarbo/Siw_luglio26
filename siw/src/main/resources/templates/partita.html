<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head-comune('Dettaglio Partita')}"></head>

<body class="text-gray-800 antialiased">
    <header th:replace="~{layout :: headbar}"></header>

   
    <main class="container">

   
        <a th:href="@{/torneo/{id}(id=${partita.torneo.id})}"
            class="btn btn-secondary d-inline-flex align-items-center mb-25">
            ← Torna al torneo
        </a>

        <!-- Partita -->
        <section class="mb-30 text-center">
            <h1 class="mb-20">Risultato Partita</h1>
            <div class="match-teams align-items-center gap-20">
                <h2 th:text="${partita.squadraCasa.nome}">Squadra 1</h2>

                <p class="risultato-partita score">
                    <span th:text="${partita.goalsHome != null ? partita.goalsHome : '0'}">0</span>
                    -
                    <span th:text="${partita.goalsAway != null ? partita.goalsAway : '0'}">0</span>
                </p>

                <h2 th:text="${partita.squadraTrasferta.nome}">Squadra 2</h2>
            </div>
        </section>

        <!-- Sezione Commenti -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8">
            <h3 class="text-xl font-bold text-gray-900 mb-6 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                    </path>
                </svg>
                Commenti
            </h3>

            <!-- form inserimento Commento -->
            <div th:if="${utenteLoggatoId != null}" class="mb-10 bg-gray-50 p-5 rounded-xl border border-gray-200">
                <form th:action="@{/partita/{id}/commento(id=${partita.id})}" method="post"
                    enctype="multipart/form-data">

                    <textarea name="testo" required rows="3" placeholder="Scrivi il tuo commento qui..."
                        class="w-full px-4 py-3 text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none mb-3"></textarea>

                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        
                        <!-- Input Upload Immagine -->
                        <div class="relative flex items-center">
                            <label for="file-upload"
                                class="cursor-pointer bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-medium py-2 px-4 rounded-lg inline-flex items-center transition-colors shadow-sm">
                                <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                    </path>
                                </svg>
                                Allega Immagine
                            </label>
                            <input id="file-upload" type="file" name="immagine" accept="image/*" class="hidden"
                                onchange="document.getElementById('file-name').textContent = this.files[0] ? this.files[0].name : ''">
                            <span id="file-name" class="ml-3 text-xs text-gray-500 truncate max-w-[150px]"></span>
                        </div>

                        <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm w-full sm:w-auto">
                            Pubblica Commento
                        </button>
                    </div>
                </form>
            </div>

            <!-- Messaggio non loggato -->
            <div th:if="${utenteLoggatoId == null}"
                class="mb-8 bg-blue-50 border border-blue-100 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4">
                <p class="text-blue-800 text-sm">Devi essere autenticato per poter commentare e allegare immagini.</p>
                <a th:href="@{/login}"
                    class="text-sm font-medium bg-white text-blue-600 border border-blue-200 py-1.5 px-4 rounded-lg hover:bg-blue-50 transition-colors whitespace-nowrap">Accedi</a>
            </div>

            <!-- Commenti -->
            <div th:if="${#lists.isEmpty(commenti)}" class="text-center py-8">
                <p class="text-gray-500 italic">Non ci sono ancora commenti per questa partita </p>
            </div>

            <div class="space-y-6">
                <div th:each="commento : ${commenti}"
                    class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm hover:shadow-md transition-shadow">

                    
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center">
                            <div class="h-9 w-9 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3"
                                th:text="${#strings.substring(commento.autore.username,0,1).toUpperCase()}">U</div>
                            <div>
                                <strong class="text-gray-900 block text-sm"
                                    th:text="${commento.autore.username}">Utente</strong>
                                
                                <span class="text-xs text-gray-500" th:if="${commento.dataCreazione != null}"
                                    th:text="${#temporals.format(commento.dataCreazione, 'dd/MM/yyyy HH:mm')}">Data</span>
                            </div>
                        </div>

                        <!-- Pulsante Modifica -->
                        <div th:if="${utenteLoggatoId != null and utenteLoggatoId == commento.autore.id}">
                            <button type="button"
                                th:onclick="'document.getElementById(\'form-modifica-' + ${commento.id} + '\').classList.toggle(\'hidden\');'"
                                class="text-xs font-medium text-gray-600 hover:text-blue-700 bg-gray-100 hover:bg-blue-50 border border-transparent hover:border-blue-200 px-3 py-1.5 rounded-md transition-all flex items-center">
                                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                                    </path>
                                </svg>
                                Modifica
                            </button>
                        </div>
                    </div>

                    <!-- Testo del commento -->
                    <p class="text-gray-700 text-sm leading-relaxed" th:text="${commento.testo}">Testo del commento...
                    </p>

                    <!-- Immagine -->
                    <div th:if="${commento.immagineBase64 != null}"
                        class="mt-4 rounded-lg overflow-hidden border border-gray-100 inline-block bg-gray-50">
                        <img th:src="'data:image/jpeg;base64,' + ${commento.immagineBase64}"
                            class="max-h-64 md:max-h-80 w-auto object-contain block"
                            alt="Immagine allegata al commento" />
                    </div>

                    <!-- Form di Modifica -->
                    <div th:if="${utenteLoggatoId != null and utenteLoggatoId == commento.autore.id}"
                        th:id="'form-modifica-' + ${commento.id}"
                        class="hidden mt-5 pt-5 border-t border-dashed border-gray-200">

                        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-4">
                            
                            <form
                                th:action="@{/partita/{pId}/commento/{cId}/modifica(pId=${partita.id}, cId=${commento.id})}"
                                method="post" enctype="multipart/form-data">

                                <textarea name="nuovoTesto" rows="3"
                                    class="w-full px-4 py-3 text-sm rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none mb-3"
                                    th:text="${commento.testo}" required></textarea>

                                <div class="relative flex items-center mb-4">
                                    <label th:for="'file-modifica-' + ${commento.id}"
                                        class="cursor-pointer bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 text-xs font-medium py-1.5 px-3 rounded inline-flex items-center transition-colors shadow-sm">
                                        <svg class="w-3.5 h-3.5 mr-1.5 text-gray-500" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12">
                                            </path>
                                        </svg>
                                        <span
                                            th:text="${commento.immagineBase64 != null ? 'Sostituisci Immagine' : 'Aggiungi Immagine'}"></span>
                                    </label>
                                    <input th:id="'file-modifica-' + ${commento.id}" type="file" name="nuovaImmagine"
                                        accept="image/*" class="hidden"
                                        th:onchange="'document.getElementById(\'nome-file-modifica-' + ${commento.id} + '\').textContent = this.files[0] ? this.files[0].name : \'\';'">
                                    <span th:id="'nome-file-modifica-' + ${commento.id}"
                                        class="ml-2 text-xs text-gray-500 truncate max-w-[120px]"></span>
                                </div>

                                <div class="flex space-x-2">
                                    <button type="submit"
                                        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 px-5 rounded-md transition-colors shadow-sm">
                                        Salva Modifiche
                                    </button>
                                    <button type="button"
                                        th:onclick="'document.getElementById(\'form-modifica-' + ${commento.id} + '\').classList.add(\'hidden\');'"
                                        class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 text-sm font-medium py-2 px-5 rounded-md transition-colors shadow-sm">
                                        Annulla
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>

</html>
