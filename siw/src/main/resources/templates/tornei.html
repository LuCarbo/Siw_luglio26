<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="it">

<head>

    <head th:replace="~{layout :: head-comune('Lista Tornei')}"></head>

</head>

<body>
    <header th:replace="~{layout :: headbar}"></header>


    <main class="container">


        <h1>Tornei Disponibili</h1>

        <!-- Visibile solo agli amministratori -->
        <section sec:authorize="hasAuthority('ADMIN')" class="admin-panel mb-30">
            <strong>Pannello Admin</strong>

            <div class="admin-actions d-flex flex-wrap gap-12 mt-15">
                <a th:href="@{/admin/tornei/nuovo}" class="btn btn-primary text-center">
                    + Crea nuovo torneo
                </a>

                <a th:href="@{/admin/squadre/nuova}" class="btn btn-primary text-center">
                    + Aggiungi squadra
                </a>

                <a th:href="@{/admin/giocatori/nuovo}" class="btn btn-primary text-center">
                    + Crea nuovo giocatore
                </a>
            </div>
        </section>

        <!-- Messaggio se non esistono tornei -->
        <section th:if="${#lists.isEmpty(tornei)}" class="empty-state text-center">
            <h2>Nessun torneo disponibile</h2>
            <p>Al momento non ci sono tornei registrati.</p>
        </section>

        <!-- Tabella dei tornei -->
        <table th:unless="${#lists.isEmpty(tornei)}">
            <thead>
                <tr>
                    <th>Nome torneo</th>
                    <th>Anno</th>
                    <th>Dettagli</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="torneo : ${tornei}">
                    <td th:text="${torneo.nome}">Nome Placeholder</td>

                    <td th:text="${torneo.anno}">2026</td>

                    <td>
                        <a class="btn btn-secondary d-inline-flex align-items-center mb-25"
                            th:href="@{/torneo/{id}(id=${torneo.id})}">
                            Vedi dettagli →
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

</body>

</html>
