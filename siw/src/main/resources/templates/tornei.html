<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="it">

<head>
    <head th:replace="~{layout :: head-comune('Lista Tornei')}"></head>
   <!-- <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Tornei</title>

    <link rel="stylesheet" th:href="@{/style.css}"> --> 
</head>

<body>

    <main class="container">

        <div class="user-bar">

            <!-- Visibile soltanto a chi NON è autenticato -->
            <a sec:authorize="isAnonymous()"
               th:href="@{/login}"
               class="btn btn-primary">
                Accedi
            </a>
        
            <!-- Visibile soltanto a chi è autenticato -->
            <div sec:authorize="isAuthenticated()" class="user-session">
                <span>
                    Benvenuto, <strong sec:authentication="name">Utente</strong>!
                </span>
        
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-logout">Esci</button>
                </form>
            </div>
        
        </div>

        <h1>Tornei Disponibili</h1>

        <!-- Visibile solo agli amministratori -->
        <section sec:authorize="hasAuthority('ADMIN')" class="admin-panel">
            <strong>Pannello Admin</strong>

            <div class="admin-actions">
                <a th:href="@{/admin/tornei/nuovo}" class="btn btn-primary">
                    + Crea nuovo torneo
                </a>

                <a th:href="@{/admin/squadre/nuova}" class="btn btn-primary">
                    + Aggiungi squadra
                </a>

                <a th:href="@{/admin/giocatori/nuovo}" class="btn btn-primary">
                    + Inserisci giocatore
                </a>
            </div>
        </section>

        <!-- Messaggio se non esistono tornei -->
        <section th:if="${#lists.isEmpty(tornei)}" class="empty-state">
            <h2>Nessun torneo disponibile</h2>
            <p>Al momento non ci sono tornei registrati.</p>
        </section>

        <!-- Tabella dei tornei -->
        <table th:unless="${#lists.isEmpty(tornei)}">
            <thead>
                <tr>
                    <th>Nome torneo</th>
                    <th>Anno</th>
                    <th>Dettagli</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="torneo : ${tornei}">
                    <td th:text="${torneo.nome}">Nome Placeholder</td>

                    <td th:text="${torneo.anno}">2026</td>

                    <td>
                        <a class="back-link"
                           th:href="@{/torneo/{id}(id=${torneo.id})}">
                            Vedi dettagli →
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

</body>
</html>
