<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head-comune(titolo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${titolo}">Titolo App</title>


    <link rel="stylesheet" th:href="@{/style.css}">
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            /* Sfondo grigio chiaro usato in precedenza */
        }
    </style>
</head>

<body>

    <header th:fragment="headbar" class="navbar">
        <div class="navbar-content d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-15">
                <a th:href="@{/}" class="fw-bold" style="font-size: 1.5rem; text-decoration: none; color: white;">SIW Tornei</a>
                <a th:href="@{/squadre}" style="text-decoration: none; color: white; margin-left: 20px;">Squadre</a>
            </div>

            <div class="user-session d-flex align-items-center gap-15" style="color: white;">
                
                <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn text-center"
                    style="background-color: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4);">
                    Accedi
                </a>

                <span sec:authorize="isAuthenticated()">
                    Benvenuto, <strong sec:authentication="name" style="color: white;">Utente</strong>!
                </span>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="btn btn-danger text-center">Esci</button>
                </form>
            </div>
        </div>
    </header>
</body>

</html>
