# ===============================
# CONNESSIONE A POSTGRESQL (FLY.IO)
# ===============================
# Usa le variabili d'ambiente fornite da Fly.io o dai secret
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# In produzione, 'update' mantiene lo schema sincronizzato senza cancellare i dati
spring.jpa.hibernate.ddl-auto=create

# Assicuriamoci che l'app non provi a ricaricare template in prod
spring.thymeleaf.cache=true

# Forza l'app a mettersi in ascolto su tutte le interfacce di rete (richiesto da Fly.io)
server.address=0.0.0.0

# Dice a Spring Boot di fidarsi degli header X-Forwarded-* inviati dal proxy di Fly.io
# Questo risolve l'errore "redirect_uri_mismatch" forzando l'uso di HTTPS nell'OAuth2
server.forward-headers-strategy=framework

# ===============================
# CONFIGURAZIONE OAUTH2 (GOOGLE)
# ===============================
# Questi dovrebbero teoricamente essere secret, ma li manteniamo come nel file originale per ora
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email

# ===============================
# CONFIGURAZIONE SESSIONE (DATABASE)
# ===============================
# Mantiene i login attivi tra le diverse macchine di Fly.io e i riavvii
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
