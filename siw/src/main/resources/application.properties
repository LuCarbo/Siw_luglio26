# ===============================
# SERVER E AMBIENTE
# ===============================
# Carica un file .env locale (se esiste) in modo sicuro
spring.config.import=optional:file:.env[.properties],optional:file:siw/.env[.properties]

# Porta su cui girerà la tua applicazione (default è 8080)
server.port=8080

# ===============================
# CONNESSIONE A POSTGRESQL
# ===============================
# Sostituisci 'tornei_db' con il nome reale del tuo database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tornei}

# Inserisci le credenziali del tuo database PostgreSQL
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Driver JDBC per PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURAZIONE JPA E HIBERNATE
# ===============================
# Imposta il dialetto corretto per ottimizzare le query per PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostra in console le query SQL generate da Hibernate (utilissimo per il debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# GESTIONE DELLO SCHEMA DEL DATABASE (MOLTO IMPORTANTE)
# 'update': Hibernate creerà o aggiornerà le tabelle in base alle tue classi Java (@Entity). Ottimo per lo sviluppo.
# In produzione dovrai cambiarlo in 'validate' o 'none'.
spring.jpa.hibernate.ddl-auto=update



spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# ===============================
# CONFIGURAZIONE THYMELEAF
# ===============================
# Disabilita la cache delle pagine HTML durante lo sviluppo.
# In questo modo, se modifichi un file .html e ricarichi la pagina, vedrai subito le modifiche.
spring.thymeleaf.cache=false

# ===============================
# CONFIGURAZIONE OAUTH2 (GOOGLE)
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email